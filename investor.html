<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Investor Relationship</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#f4f4f4;
        }

        .container{
            width:90%;
            max-width:700px;
            margin:50px auto;
            background:#fff;
            padding:30px;
            border-radius:10px;
            box-shadow:0 4px 10px rgba(0,0,0,0.2);
        }

        h1{
            text-align:center;
            margin-bottom:25px;
            color:#333;
        }

        label{
            font-weight:bold;
            display:block;
            margin-top:15px;
            margin-bottom:5px;
        }

        input,
        select,
        textarea{
            width:100%;
            padding:10px;
            border:1px solid #ccc;
            border-radius:5px;
            font-size:16px;
        }

        textarea{
            resize:none;
            height:100px;
        }

        button{
            width:100%;
            margin-top:20px;
            padding:12px;
            background:#007bff;
            color:white;
            border:none;
            border-radius:5px;
            font-size:18px;
            cursor:pointer;
        }

        button:hover{
            background:#0056b3;
        }
    </style>
</head>
<body>

<div class="container">

    <h1>Create Investor Relationship</h1>

    <form>

        <label>Investor Name</label>
        <input type="text" placeholder="Enter Investor Name">

        <label>Company Name</label>
        <input type="text" placeholder="Enter Company Name">

        <label>Email Address</label>
        <input type="email" placeholder="Enter Email">

        <label>Phone Number</label>
        <input type="tel" placeholder="Enter Phone Number">

        <label>Investment Type</label>
        <select>
            <option>Angel Investor</option>
            <option>Venture Capital</option>
            <option>Private Equity</option>
            <option>Corporate Investor</option>
        </select>

        <label>Investment Amount</label>
        <input type="number" placeholder="Enter Amount">

        <label>Message</label>
        <textarea placeholder="Write your message here..."></textarea>

        <button type="submit">Submit</button>

    </form>

</div>

</body>
</html>
