<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup Page</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            background:#f2f2f2;
        }

        .signup-box{
            width:350px;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.2);
        }

        .signup-box h2{
            text-align:center;
            margin-bottom:20px;
        }

        .signup-box input{
            width:100%;
            padding:10px;
            margin:8px 0;
            border:1px solid #ccc;
            border-radius:5px;
        }

        .signup-box button{
            width:100%;
            padding:10px;
            margin-top:10px;
            background:#007BFF;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
            font-size:16px;
        }

        .signup-box button:hover{
            background:#0056b3;
        }

        .signup-box p{
            text-align:center;
            margin-top:15px;
        }

        .signup-box a{
            text-decoration:none;
            color:#007BFF;
        }
    </style>
</head>
<body>

    <div class="signup-box">
        <h2>Sign Up</h2>

        <form>
            <input type="text" placeholder="Full Name" required>

            <input type="email" placeholder="Email Address" required>

            <input type="password" placeholder="Password" required>

            <input type="password" placeholder="Confirm Password" required>

            <button type="submit">Sign Up</button>
        </form>

        <p>Already have an account? <a href="#">Login</a></p>
    </div>

</body>
</html>
