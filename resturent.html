<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Restaurant</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f5f5f5;
}

h1{
    text-align:center;
    margin:30px 0;
    color:#333;
}

.container{
    width:90%;
    margin:auto;
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
}

.card{
    width:280px;
    background:white;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 4px 10px rgba(0,0,0,0.2);
    transition:0.3s;
}

.card:hover{
    transform:scale(1.05);
}

.card img{
    width:100%;
    height:180px;
    object-fit:cover;
}

.card-content{
    padding:15px;
}

.card-content h2{
    margin-bottom:10px;
    color:#222;
}

.card-content p{
    color:#666;
    margin-bottom:8px;
}

button{
    width:100%;
    padding:10px;
    background:tomato;
    color:white;
    border:none;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:red;
}
</style>

</head>
<body>

<h1>Restaurants</h1>

<div class="container">

    <div class="card">
        <img src="/pizza.png" alt="pizza">
        <div class="card-content">
            <h2>Pizza Hub</h2>
            <p>Italian Pizza & Fast Food</p>
            <button>Add Restaurant</button>
        </div>
    </div>

    <div class="card">
        <img src="/burger.png" alt="burger">
        <div class="card-content">
            <h2>Burger King</h2>
            <p>Best Burgers & Fries</p>
            <button>Add Restaurant</button>
        </div>
    </div>

    <div class="card">
        <img src="/biryani.png" alt="biryani">
        <div class="card-content">
            <h2>Biryani House</h2>
            <p>Delicious Hyderabadi Biryani</p>
            <button>Add Restaurant</button>
        </div>
    </div>

    <div class="card">
        <img src="/royal.png" alt="royal resurant">
        <div class="card-content">
            <h2>Royal Restaurant</h2>
            <p>North Indian Special</p>
            <button>Add Restaurant</button>
        </div>
    </div>

    <div class="card">
        <img src="/food.png" alt="food corner">
        <div class="card-content">
            <h2>Food Corner</h2>
            <p>Chinese & Indian Cuisine</p>
            <button>Add Restaurant</button>
        </div>
    </div>

</div>

</body>
</html>
